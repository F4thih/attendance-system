{% load static %}

<!DOCTYPE html>
<html>
<head>
  <title>{{ student.name }} - Attendance</title>
  <link rel="icon" type="image/x-icon" href="{% static 'attendance_app/inst.ico' %}"

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #4e54c8, #8f94fb);
      color: #333;
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: url("{% static 'attendance_app/bg.jpeg' %}") no-repeat center center fixed;
      background-size: cover;
    }

    .card {
      width: 100%;
      max-width: 800px;
      background: #fff;
      border-radius: 16px;
      padding: 30px 25px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #203a43;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px 10px;
      text-align: center;
    }

    thead {
      background: #007bff;
      color: #fff;
    }

    tr {
      transition: background 0.2s;
    }

    tr:hover {
      background: #f1f5f9;
    }

    .present {
      color: #28a745;
      font-weight: bold;
    }

    .absent {
      color: #dc3545;
      font-weight: bold;
    }

    .back-btn {
      display: block;
      margin: 25px auto 0;
      width: 180px;
      padding: 12px;
      text-align: center;
      background: #28a745;
      border-radius: 10px;
      text-decoration: none;
      color: #fff;
      transition: 0.3s;
    }

    .back-btn:hover {
      background: #1e7e34;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>{{ student.name }} - Last 30 Days Attendance</h2>

  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Status</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody>
      {% for att in attendance_list %}
      <tr>
        <td>{{ att.date }}</td>
        <td class="{% if att.status == 'Present' %}present{% else %}absent{% endif %}">{{ att.status }}</td>
        <td>{{ att.time|default:"--:--"|date:"h:i A" }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

  <a href="{% url 'attendance_status' %}" class="back-btn"> Back to Dashboard</a>
</div>

</body>
</html>
