<!DOCTYPE html>
<html>
<head>
    <title>Live Attendance Scan</title>
  <link rel="icon" type="image/x-icon" href="{% static 'attendance_app/inst.ico' %}"

</head>
<body>
    <h1>Scan ID Card</h1>

    <form id="scan-form" method="POST" enctype="multipart/form-data" action="{% url 'live_scan' %}">
        {% csrf_token %}
        <input type="file" name="id_card" accept="image/*" capture="environment">
        <button type="submit">Scan ID</button>
    </form>

    <div id="response"></div>

    <script>
        const form = document.getElementById('scan-form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(form);

            const response = await fetch("{% url 'live_scan' %}", {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            document.getElementById('response').innerText = data.message;
        });
    </script>
</body>
</html>
